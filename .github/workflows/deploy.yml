name: Deploy Angular to Hostinger

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-config:
    runs-on: ubuntu-latest

    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
      HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
      HOSTINGER_TARGET: ${{ secrets.HOSTINGER_TARGET }}
      HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
      PROD_API_URL: ${{ secrets.PROD_API_URL }}
      PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}

    steps:
      - name: Validate required secrets and URLs
        run: |
          set -euo pipefail

          require_value() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "::error title=Missing secret::$name is empty or not configured."
              exit 1
            fi
          }

          require_url() {
            local name="$1"
            local value="$2"

            require_value "$name" "$value"

            if [[ ! "$value" =~ ^https?:// ]]; then
              echo "::error title=Invalid URL::$name must start with http:// or https://"
              exit 1
            fi

            if [[ "$value" == *"YOUR_"* ]]; then
              echo "::error title=Placeholder detected::$name is still using a placeholder value."
              exit 1
            fi
          }

          require_value "FIREBASE_API_KEY" "$FIREBASE_API_KEY"
          require_value "FIREBASE_APP_ID" "$FIREBASE_APP_ID"
          require_value "FIREBASE_AUTH_DOMAIN" "$FIREBASE_AUTH_DOMAIN"
          require_value "FIREBASE_MESSAGING_SENDER_ID" "$FIREBASE_MESSAGING_SENDER_ID"
          require_value "FIREBASE_PROJECT_ID" "$FIREBASE_PROJECT_ID"
          require_value "FIREBASE_STORAGE_BUCKET" "$FIREBASE_STORAGE_BUCKET"
          require_value "HOSTINGER_HOST" "$HOSTINGER_HOST"
          require_value "HOSTINGER_PORT" "$HOSTINGER_PORT"
          require_value "HOSTINGER_SSH_KEY" "$HOSTINGER_SSH_KEY"
          require_value "HOSTINGER_TARGET" "$HOSTINGER_TARGET"
          require_value "HOSTINGER_USER" "$HOSTINGER_USER"
          require_url "PROD_API_URL" "$PROD_API_URL"
          require_url "PROD_FRONTEND_URL" "$PROD_FRONTEND_URL"

          if [[ ! "$FIREBASE_API_KEY" =~ ^AIza ]]; then
            echo "::error title=Invalid Firebase API key::FIREBASE_API_KEY does not look like a Firebase Web API key."
            exit 1
          fi

          if [[ ! "$FIREBASE_APP_ID" =~ ^[0-9]+:[0-9]+:web: ]]; then
            echo "::error title=Invalid Firebase App ID::FIREBASE_APP_ID does not match the expected web app format."
            exit 1
          fi

          if [[ ! "$FIREBASE_MESSAGING_SENDER_ID" =~ ^[0-9]+$ ]]; then
            echo "::error title=Invalid sender ID::FIREBASE_MESSAGING_SENDER_ID must be numeric."
            exit 1
          fi

          if [[ ! "$FIREBASE_AUTH_DOMAIN" =~ \.firebaseapp\.com$ ]]; then
            echo "::warning title=Check auth domain::FIREBASE_AUTH_DOMAIN usually ends with .firebaseapp.com"
          fi

          echo "Configuration secrets look valid."

  test-main-screens:
    runs-on: ubuntu-latest
    needs: validate-config

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Firebase local config
        run: |
          cat > src/environments/firebase.local.ts << EOF
          export const firebaseConfig = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}'
          };
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Chrome
        id: chrome-main
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run main screens tests
        env:
          CHROME_BIN: ${{ steps.chrome-main.outputs.chrome-path }}
        run: npm run test:main-screens

  test-buttons-routes:
    runs-on: ubuntu-latest
    needs: validate-config

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Firebase local config
        run: |
          cat > src/environments/firebase.local.ts << EOF
          export const firebaseConfig = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}'
          };
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Chrome
        id: chrome-routes
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run buttons and routes tests
        env:
          CHROME_BIN: ${{ steps.chrome-routes.outputs.chrome-path }}
        run: npm run test:buttons-routes

  test-auth-flow:
    runs-on: ubuntu-latest
    needs: validate-config

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Firebase local config
        run: |
          cat > src/environments/firebase.local.ts << EOF
          export const firebaseConfig = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}'
          };
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Chrome
        id: chrome-auth
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run auth flow tests
        env:
          CHROME_BIN: ${{ steps.chrome-auth.outputs.chrome-path }}
        run: >
          npx ng run frontend:test --watch=false --browsers=ChromeHeadlessCI --progress=false
          --include src/testing/auth-flow.workflow.spec.ts
          --include src/app/core/services/auth.service.spec.ts
          --include src/app/pages/auth-action/auth-action.component.spec.ts
          --include src/app/core/guards/auth.guard.spec.ts
          --include src/app/pages/auth/auth.component.spec.ts

  test-post-login:
    runs-on: ubuntu-latest
    needs: validate-config

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Firebase local config
        run: |
          cat > src/environments/firebase.local.ts << EOF
          export const firebaseConfig = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}'
          };
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Chrome
        id: chrome-post-login
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run post-login tests
        env:
          CHROME_BIN: ${{ steps.chrome-post-login.outputs.chrome-path }}
        run: npm run test:post-login

  build:
    runs-on: ubuntu-latest
    needs:
      - test-main-screens
      - test-buttons-routes
      - test-auth-flow
      - test-post-login

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Firebase local config
        run: |
          cat > src/environments/firebase.local.ts << EOF
          export const firebaseConfig = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}'
          };
          EOF

      - name: Create production environment config
        run: |
          cat > src/environments/environment.prod.ts << EOF
          import { firebaseConfig } from './firebase.local';

          export const environment = {
            production: true,
            apiUrl: '${{ secrets.PROD_API_URL }}',
            frontendUrl: '${{ secrets.PROD_FRONTEND_URL }}',
            firebase: firebaseConfig
          };
          EOF

      - name: Verify production environment config
        run: |
          grep -q "${{ secrets.PROD_API_URL }}" src/environments/environment.prod.ts
          grep -q "${{ secrets.PROD_FRONTEND_URL }}" src/environments/environment.prod.ts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production --base-href /

      - name: Create .htaccess for Angular routes
        run: |
          cat > dist/public/browser/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Verify build output
        run: |
          ls -la dist/public
          ls -la dist/public/browser
          test -f dist/public/browser/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/public/browser
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: dist/public/browser

      - name: Verify deploy artifact
        run: |
          echo "Deploy target: ${{ secrets.HOSTINGER_TARGET }}"
          ls -la dist/public/browser
          test -f dist/public/browser/index.html

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy build
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_rsa \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "mkdir -p '${{ secrets.HOSTINGER_TARGET }}'"
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_rsa" \
            dist/public/browser/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_TARGET }}/

      - name: Verify remote files
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_rsa \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "ls -la '${{ secrets.HOSTINGER_TARGET }}' | head -n 20"
