<section class="reset-wrapper">
  <div class="reset-card">
    <h1>Nova senha</h1>
    <p>Escolha uma nova senha para sua conta.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="password">Nova senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Minimo 8 caracteres"
          [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <small class="text-danger" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Senha deve ter no minimo 8 caracteres.
        </small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirme a senha</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Digite novamente"
          [class.is-invalid]="form.touched && form.errors?.['passwordMismatch']"
        />
        <small class="text-danger" *ngIf="form.touched && form.errors?.['passwordMismatch']">
          As senhas nao coincidem.
        </small>
      </div>

      <button class="btn-primary" type="submit" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        {{ isLoading ? 'Salvando...' : 'Atualizar senha' }}
      </button>
    </form>
  </div>
</section>
